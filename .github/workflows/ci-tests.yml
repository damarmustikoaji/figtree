name: CI Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium + system deps
        working-directory: tests
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps only (cache hit)
        working-directory: tests
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Prepare test-results directory
        run: mkdir -p tests/test-results

      - name: Start static server
        working-directory: tests
        run: npx serve .. -l 3000 &

      - name: Wait for server
        working-directory: tests
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Playwright tests
        working-directory: tests
        run: npm test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: tests/playwright-report
          retention-days: 14

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: tests/test-results
          retention-days: 14

      - name: Test Summary
        if: always()
        run: |
          echo "## Playwright Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Project: **PT Hello Kognisia Indonesia**" >> $GITHUB_STEP_SUMMARY
          echo "- Base URL: http://localhost:3000" >> $GITHUB_STEP_SUMMARY
          echo "- Browser: Chromium" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY